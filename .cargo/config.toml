# GLASS — DX12-only wgpu backend
# This ensures wgpu never attempts Vulkan/GL/Metal backends.
#
# Build on WSL2 (Windows parity mode):
#   /usr/local/bin/cargo is a wrapper script that calls cargo.exe (works in non-interactive shells).
#   Machine-level config (~/.cargo/config.toml on Windows side) must set:
#     - [target.x86_64-pc-windows-msvc] linker = "<full path to link.exe>"
#     - [env] LIB = "<MSVC lib>;<WinSDK ucrt>;<WinSDK um>"
#     - [build] target-dir = "<Windows FS path>"  (avoids WSL2 lock-file errors)

[build]
# Target Windows MSVC (the only supported platform for this project).
target = "x86_64-pc-windows-msvc"

[env]
# Force wgpu to use DX12 backend only
WGPU_BACKEND = "dx12"

[patch.crates-io]
# Publish/package verification builds run from target/package, so mirror
# workspace-local patches here to keep dry-runs aligned with the workspace.
glass-core = { path = "glass-core" }
wgpu-core = { path = "third_party/wgpu/wgpu-core" }
wgpu-hal = { path = "third_party/wgpu/wgpu-hal" }
wgpu-types = { path = "third_party/wgpu/wgpu-types" }
naga = { path = "third_party/wgpu/naga" }
