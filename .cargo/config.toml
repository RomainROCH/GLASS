# GLASS — DX12-only wgpu backend
# This ensures wgpu never attempts Vulkan/GL/Metal backends.
#
# Build on WSL2 (Windows parity mode):
#   alias cargo="/mnt/c/Users/<user>/.cargo/bin/cargo.exe"  (in ~/.bashrc)
#   Machine-level config (~/.cargo/config.toml on Windows side) must set:
#     - [target.x86_64-pc-windows-msvc] linker = "<full path to link.exe>"
#     - [env] LIB = "<MSVC lib>;<WinSDK ucrt>;<WinSDK um>"
#     - [build] target-dir = "<Windows FS path>"  (avoids WSL2 lock-file errors)

[build]
# Target Windows MSVC (the only supported platform for this project).
target = "x86_64-pc-windows-msvc"

[env]
# Force wgpu to use DX12 backend only
WGPU_BACKEND = "dx12"
