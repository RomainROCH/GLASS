[package]
name = "glass-overlay"
version = "0.1.0"
edition.workspace = true

[features]
default = []
# Test build mode: renders permanent watermark, forces input passthrough,
# enables TRACE-level logging, prepends [MODE TEST] to tray tooltip.
# Used during anti-cheat validation campaigns (see PlanSecurite Phase 0.3).
test_mode = []

[dependencies]
glass-core = { path = "../glass-core" }
wgpu = { workspace = true }
windows = { workspace = true }
raw-window-handle = { workspace = true }
tracing = { workspace = true }
pollster = { workspace = true }
