[package]
name = "wgpu-hal"
version = "24.0.4"
authors = ["gfx-rs developers"]
edition = "2021"
description = "Hardware abstraction layer for wgpu, the cross-platform, safe, pure-rust graphics API"
homepage = "https://wgpu.rs/"
repository = "https://github.com/gfx-rs/wgpu"
keywords = ["graphics"]
license = "MIT OR Apache-2.0"
rust-version = "1.76"

[package.metadata.docs.rs]
features = ["vulkan", "gles", "renderdoc"]
rustdoc-args = ["--cfg", "docsrs"]
targets = [
    "x86_64-unknown-linux-gnu",
    "x86_64-apple-darwin",
    "x86_64-pc-windows-msvc",
    "wasm32-unknown-unknown",
]

[package.metadata.cargo-machete]
ignored = ["cfg_aliases"]

[lib]

[features]
metal = [
    "naga/msl-out-if-target-apple",
    "dep:block",
]
vulkan = [
    "naga/spv-out",
    "dep:ash",
    "dep:gpu-alloc",
    "dep:gpu-descriptor",
    "dep:libloading",
    "dep:smallvec",
    "dep:android_system_properties",
    "dep:ordered-float",
]
gles = [
    "naga/glsl-out",
    "dep:bytemuck",
    "dep:glow",
    "dep:glutin_wgl_sys",
    "dep:khronos-egl",
    "dep:libloading",
    "dep:ndk-sys",
    "windows/Win32_Graphics_OpenGL",
    "windows/Win32_Graphics_Gdi",
    "windows/Win32_System_LibraryLoader",
    "windows/Win32_UI_WindowsAndMessaging",
]
dx12 = [
    "dep:bit-set",
    "dep:libloading",
    "dep:range-alloc",
    "dep:windows-core",
    "gpu-allocator/d3d12",
    "naga/hlsl-out-if-target-windows",
    "windows/Win32_Graphics_Direct3D_Fxc",
    "windows/Win32_Graphics_Direct3D_Dxc",
    "windows/Win32_Graphics_Direct3D",
    "windows/Win32_Graphics_Direct3D12",
    "windows/Win32_Graphics_DirectComposition",
    "windows/Win32_Graphics_Dxgi_Common",
    "windows/Win32_Security",
    "windows/Win32_System_Diagnostics_Debug",
    "windows/Win32_System_Kernel",
    "windows/Win32_System_Performance",
    "windows/Win32_System_Threading",
    "windows/Win32_UI_WindowsAndMessaging",
]
static-dxc = ["dep:mach-dxcompiler-rs"]
renderdoc = ["dep:libloading", "dep:renderdoc-sys"]
fragile-send-sync-non-atomic-wasm = ["wgt/fragile-send-sync-non-atomic-wasm"]
oom_panic = []
device_lost_panic = []
internal_error_panic = []

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(web_sys_unstable_apis)'] }

[[example]]
name = "halmark"

[[example]]
name = "raw-gles"
required-features = ["gles"]

[dependencies]
bitflags = "2.7"
parking_lot = "0.12.1"
profiling = { version = "1", default-features = false }
raw-window-handle = "0.6"
thiserror = "2"
once_cell = "1.20.2"
ordered-float = { version = ">=3,<=4.6", optional = true }

# backends common
arrayvec = "0.7"
rustc-hash = "1"
log = "0.4"

# backend: Gles
bytemuck = { version = "1.21", features = ["derive", "min_const_generics"], optional = true }
glow = { version = "0.16", optional = true }

[dependencies.wgt]
package = "wgpu-types"
version = "24.0.0"

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
ash = { version = "0.38.0", optional = true }
gpu-alloc = { version = "0.6", optional = true }
gpu-descriptor = { version = "0.3", optional = true }
smallvec = { version = "1", optional = true, features = ["union"] }

khronos-egl = { version = "6", features = ["dynamic"], optional = true }
libloading = { version = "0.8", optional = true }
renderdoc-sys = { version = "1.1.0", optional = true }

[target.'cfg(target_os = "emscripten")'.dependencies]
khronos-egl = { version = "6", features = ["static", "no-pkg-config"] }
libloading = { version = "0.8", optional = true }

[target.'cfg(windows)'.dependencies]
windows = { version = "0.58", default-features = false, optional = true }
bit-set = { version = "0.8", optional = true }
range-alloc = { version = "0.1", optional = true }
gpu-allocator = { version = "0.27", default-features = false, optional = true }
windows-core = { version = "0.58", default-features = false, optional = true }
glutin_wgl_sys = { version = "0.6", optional = true }

[target.'cfg(all(windows, not(target_arch = "aarch64")))'.dependencies]
mach-dxcompiler-rs = { version = "0.1.4", default-features = false, optional = true }

[target.'cfg(target_vendor = "apple")'.dependencies]
block = { version = "0.1", optional = true }
metal = "0.31.0"
objc = "0.2.5"
core-graphics-types = "0.1"

[target.'cfg(all(target_arch = "wasm32", not(target_os = "emscripten")))'.dependencies]
wasm-bindgen = "0.2.97"
web-sys = { version = "0.3.74", default-features = false, features = [
    "default",
    "Window",
    "HtmlCanvasElement",
    "WebGl2RenderingContext",
    "OffscreenCanvas",
] }
js-sys = { version = "0.3.70", default-features = false, features = ["default"] }

[target.'cfg(unix)'.dependencies]
libc = "0.2"

[target.'cfg(target_os = "android")'.dependencies]
android_system_properties = { version = "0.1.1", optional = true }
ndk-sys = { version = "0.5.0", optional = true }

[dependencies.naga]
version = "24.0.0"

[build-dependencies]
cfg_aliases = "0.2.1"

[dev-dependencies.naga]
version = "24.0.0"
features = ["wgsl-in"]

[dev-dependencies]
cfg-if = "1"
env_logger = "0.11"
glam = "0.29"
winit = { version = "0.29", features = ["android-native-activity"] }

[target.'cfg(not(any(target_arch = "wasm32", target_os = "ios", target_os = "visionos")))'.dev-dependencies]
glutin-winit = { version = "0.4", default-features = false, features = [
    "egl",
    "wgl",
    "wayland",
    "x11",
] }
glutin = { version = "0.31", default-features = false, features = [
    "egl",
    "wgl",
    "wayland",
    "x11",
] }
rwh_05 = { version = "0.5", package = "raw-window-handle" }
winit = { version = "0.29", features = ["android-native-activity", "rwh_05"] }
